<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrocerySync — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #3B82F6;
      --accent2: #6366F1;
      --accent3: #0EA5E9;
    }

    body {
      min-height: 100vh;
      background: #050508;
      font-family: 'Inter', sans-serif;
      color: #fff;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Animated background blobs ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      animation: drift linear infinite;
    }

    .blob-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #3B82F6, transparent 70%);
      top: -200px; left: -200px;
      animation-duration: 28s;
    }
    .blob-2 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #6366F1, transparent 70%);
      bottom: -150px; right: -150px;
      animation-duration: 34s;
      animation-direction: reverse;
    }
    .blob-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #0EA5E9, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 22s;
      animation-delay: -8s;
    }
    .blob-4 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #8B5CF6, transparent 70%);
      bottom: 10%; left: 10%;
      animation-duration: 40s;
      animation-delay: -15s;
    }

    @keyframes drift {
      0%   { transform: translate(0px, 0px) scale(1); }
      25%  { transform: translate(60px, -40px) scale(1.05); }
      50%  { transform: translate(30px, 60px) scale(0.97); }
      75%  { transform: translate(-50px, 20px) scale(1.03); }
      100% { transform: translate(0px, 0px) scale(1); }
    }

    /* Subtle grid overlay */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── Main content ── */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 900px;
      width: 100%;
      gap: 2.5rem;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid rgba(59, 130, 246, 0.35);
      background: rgba(59, 130, 246, 0.08);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.18em;
      color: #93C5FD;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3B82F6;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* ── Heading ── */
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      position: relative;
      width: 44px; height: 44px;
    }

    .logo-icon circle { fill: none; }

    h1 {
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, #93C5FD 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.45);
      font-weight: 300;
      max-width: 480px;
      line-height: 1.65;
      letter-spacing: 0.01em;
    }

    .tagline strong {
      color: rgba(255,255,255,0.75);
      font-weight: 400;
    }

    /* ── Glass card ── */
    .glass-card {
      width: 100%;
      max-width: 820px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(59,130,246,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Phone mockup row ── */
    .phones {
      display: flex;
      gap: 20px;
      align-items: flex-end;
      justify-content: center;
    }

    .phone {
      border-radius: 36px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .phone-main {
      width: 220px;
      height: 440px;
    }

    .phone-side {
      width: 180px;
      height: 360px;
      opacity: 0.6;
      transform: perspective(800px) rotateY(12deg) rotateX(2deg);
    }

    .phone-side.right {
      transform: perspective(800px) rotateY(-12deg) rotateX(2deg);
    }

    /* Notch */
    .phone::before {
      content: '';
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 100px;
      z-index: 5;
    }

    /* Placeholder content inside phone */
    .phone-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 48px 16px 20px;
    }

    .phone-placeholder-label {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Simulated UI bars inside phone */
    .ui-bars {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .ui-bar {
      height: 8px;
      border-radius: 100px;
      background: rgba(255,255,255,0.06);
    }

    .ui-bar.accent { background: rgba(59,130,246,0.25); }
    .ui-bar.short { width: 60%; }
    .ui-bar.shorter { width: 40%; }

    .ui-circle {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.25);
      flex-shrink: 0;
    }

    /* Replace phone inner with image when you have one */
    .phone img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Caption below phones */
    .card-caption {
      margin-top: 1.5rem;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Notify section ── */
    .notify-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .notify-input {
      padding: 12px 20px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      width: 260px;
      transition: border-color 0.2s;
    }

    .notify-input::placeholder { color: rgba(255,255,255,0.25); }
    .notify-input:focus { border-color: rgba(59,130,246,0.5); }

    .notify-btn {
      padding: 12px 24px;
      border-radius: 100px;
      border: none;
      background: linear-gradient(135deg, #3B82F6, #6366F1);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .notify-btn:hover { opacity: 0.88; transform: scale(0.98); }
    .notify-btn:active { transform: scale(0.95); }

    /* ── Footer ── */
    .footer {
      font-size: 12px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.05em;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .phone-side { display: none; }
      .phone-main { width: 200px; height: 400px; }
      .glass-card { padding: 1.5rem; border-radius: 20px; }

      /* Mobile carousel arrows */
      .carousel-arrows {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        transform: translateY(-50%);
        pointer-events: none;
        z-index: 10;
      }

      .carousel-arrow {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid rgba(59, 130, 246, 0.3);
        color: #3B82F6;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        pointer-events: auto;
        transition: all 0.2s ease;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .carousel-arrow:hover {
        background: rgba(59, 130, 246, 0.2);
        border-color: rgba(59, 130, 246, 0.5);
        transform: scale(1.05);
      }

      .carousel-arrow:active {
        transform: scale(0.95);
      }

      .carousel-arrow svg {
        width: 16px;
        height: 16px;
      }

      /* Mobile carousel container */
      .phones {
        position: relative;
        overflow: hidden;
      }

      .phone-carousel {
        display: flex;
        transition: transform 0.3s ease;
        width: 300%;
      }

      .phone-carousel-item {
        flex: 0 0 33.333%;
        display: flex;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>
  <div class="grid-overlay"></div>

  <!-- Content -->
  <div class="content">

    <!-- Badge -->
    <div class="badge">
      <span class="badge-dot"></span>
      Coming Soon
    </div>

    <!-- Heading -->
    <div>
      <div class="logo-row">
        <svg class="logo-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="22" r="3" fill="#3B82F6"/>
          <circle cx="22" cy="22" r="9" stroke="#3B82F6" stroke-width="1.2" opacity="0.5"/>
          <circle cx="22" cy="22" r="16" stroke="#3B82F6" stroke-width="0.8" opacity="0.25"/>
        </svg>
        <h1>GrocerySync</h1>
      </div>
      <p class="tagline">
        The <strong>household spending tracker</strong> built for families —
        log every shop trip, split by member, see where your money goes.
      </p>
    </div>

    <!-- Phone mockup card -->
    <div class="glass-card">
      <div class="phones">
        <!-- Mobile carousel arrows -->
        <div class="carousel-arrows">
          <button class="carousel-arrow" id="prev-arrow">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="carousel-arrow" id="next-arrow">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div class="phone-carousel" id="phone-carousel">
          <div class="phone-carousel-item">
            <!-- Left phone (side) -->
            <div class="phone phone-side">
              <img src="images/screen1.png" alt="App screenshot" />
            </div>
          </div>

          <div class="phone-carousel-item">
            <!-- Centre phone (main) -->
            <div class="phone phone-main">
              <img src="images/screen2.png" alt="App screenshot" />
            </div>
          </div>

          <div class="phone-carousel-item">
            <!-- Right phone (side) -->
            <div class="phone phone-side right">
              <img src="images/screen3.png" alt="App screenshot" />
            </div>
          </div>
        </div>
      </div>
      <p class="card-caption">App preview — screenshots coming soon</p>
    </div>

    <!-- Notify -->
    <div class="notify-row">
      <input class="notify-input" type="email" placeholder="your@email.com" />
      <button class="notify-btn">Notify me</button>
    </div>

    <!-- Footer -->
    <p class="footer">Built with care · GrocerySync © 2025</p>

  </div>

  <script>
    // Mobile carousel functionality
    document.addEventListener('DOMContentLoaded', function() {
      const carousel = document.getElementById('phone-carousel');
      const prevArrow = document.getElementById('prev-arrow');
      const nextArrow = document.getElementById('next-arrow');
      let currentIndex = 1; // Start with middle slide (screen2.png)

      function updateCarousel() {
        const translateX = -currentIndex * (100 / 3);
        carousel.style.transform = `translateX(${translateX}%)`;
      }

      function nextSlide() {
        currentIndex = (currentIndex + 1) % 3;
        updateCarousel();
      }

      function prevSlide() {
        currentIndex = (currentIndex - 1 + 3) % 3;
        updateCarousel();
      }

      // Add event listeners
      nextArrow.addEventListener('click', nextSlide);
      prevArrow.addEventListener('click', prevSlide);

      // Initialize carousel position
      updateCarousel();
    });
  </script>

</body>
</html>
